<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Course Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body">
    <!-- Auth Container -->
    <div class="auth-container">
        <!-- Left Side - Branding -->
        <div class="auth-branding">
            <div class="branding-content">
                <div class="brand-logo">
                    <i class="fas fa-graduation-cap"></i>
                    <h1>AI Course Builder</h1>
                </div>
                <h2>Welcome Back!</h2>
                <p>Continue your personalized learning journey with AI-powered courses tailored just for you.</p>
                <div class="branding-features">
                    <div class="feature">
                        <i class="fas fa-check"></i>
                        <span>AI-Generated Curricula</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-check"></i>
                        <span>Curated Video Content</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-check"></i>
                        <span>Interactive Assessments</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="auth-form-container">
            <div class="auth-form">
                <div class="form-header">
                    <h2>Sign In</h2>
                    <p>Access your learning dashboard</p>
                </div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email Address
                        </label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <input type="password" id="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-sign-in-alt"></i>
                        Sign In
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html">Create Account</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Please fill in all fields');
                return;
            }
            
            // Call backend API
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(res => res.json())
            .then(data => {
                console.log('Login response:', data);
                if (data.success && data.token) {
                    localStorage.setItem('token', data.token);
                    if (data.user) {
                        localStorage.setItem('userName', data.user.fullName || data.user.name || '');
                        localStorage.setItem('userEmail', data.user.email || '');
                    }
                    alert('Login successful!');
                    setTimeout(() => {
                        window.location.href = 'courses.html';
                    }, 500);
                } else {
                    alert(data.error || 'Login failed. Please check your credentials.');
                }
            })
            .catch(err => {
                console.error('Login error:', err);
                alert('Server error. Make sure backend is running on port 3000.');
            });
        });
    </script>
</body>
</html>
